<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test in umd mode</title>
    <script src="../dist/index.umd.js"></script>
  </head>
  <body>
    <style>
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: #f4f6f8;
        color: #1f2937;
      }

      button,
      input {
        font: inherit;
      }

      .page {
        width: min(820px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .toolbar,
      .stats,
      .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 12px;
      }
      .filters {
        justify-content: space-between;
      }

      input[type='text'] {
        flex: 1;
        min-width: 220px;
        height: 36px;
        border: 1px solid #d0d5dd;
        border-radius: 6px;
        padding: 0 10px;
      }

      button {
        height: 36px;
        border: 1px solid #2563eb;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        padding: 0 12px;
        cursor: pointer;
      }

      button.secondary {
        background: #fff;
        color: #2563eb;
      }

      button.active {
        background: #1e40af;
        border-color: #1e40af;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .stat {
        border: 1px solid #d0d5dd;
        border-radius: 6px;
        background: #fff;
        padding: 8px 10px;
      }

      .list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .item {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 10px;
        align-items: center;
        border: 1px solid #d0d5dd;
        border-radius: 8px;
        background: #fff;
        padding: 10px;
      }

      .item.done .title {
        color: #667085;
        text-decoration: line-through;
      }

      .empty {
        border: 1px dashed #d0d5dd;
        border-radius: 8px;
        background: #fff;
        color: #667085;
        padding: 24px;
        text-align: center;
      }
    </style>
    <div id="app"></div>
    <script>
      const {
        createDeepStore,
        createMemo,
        produce,
        snapshot,
        render,
        jsx,
        For,
        Show,
      } = signal;

      const state = createDeepStore({
        draft: '',
        filter: 'all',
        todos: [
          { id: 't1', title: '学习 createSignal', done: true },
          { id: 't2', title: '写一个响应式列表', done: false },
        ],
      });

      const totalCount = createMemo(() => state.todos.length);

      const doneCount = createMemo(() => {
        return state.todos.filter((todo) => todo.done).length;
      });

      const activeCount = createMemo(() => totalCount() - doneCount());

      const visibleTodos = createMemo(() => {
        if (state.filter === 'active') {
          return state.todos.filter((todo) => !todo.done);
        }

        if (state.filter === 'done') {
          return state.todos.filter((todo) => todo.done);
        }

        return state.todos;
      });

      const canAdd = createMemo(() => state.draft.trim().length > 0);

      function addTodo() {
        const title = state.draft.trim();

        if (!title) return;

        state.todos.unshift({
          id: crypto.randomUUID(),
          title,
          done: false,
        });

        state.draft = '';
      }

      function removeTodo(id) {
        const index = state.todos.findIndex((todo) => todo.id === id);

        if (index >= 0) {
          state.todos.splice(index, 1);
        }
      }

      function clearDone() {
        produce(state, (draft) => {
          for (let index = draft.todos.length - 1; index >= 0; index -= 1) {
            if (draft.todos[index].done) {
              draft.todos.splice(index, 1);
            }
          }
        });
      }

      function exportData() {
        console.log(snapshot(state.todos));
      }

      render(
        () => jsx`
    <main class="page">
      <h1>任务面板</h1>

      <div class="toolbar">
        <input
          type="text"
          placeholder="输入任务后按 Enter"
          value=${() => state.draft}
          onInput=${(event) => {
            state.draft = event.currentTarget.value;
          }}
          onKeyDown=${(event) => {
            if (event.key === 'Enter') addTodo();
          }}
        >
        <button disabled=${() => !canAdd()} onClick=${addTodo}>新增</button>
      </div>

      <div class="stats">
        <span class="stat">${() => `全部：${totalCount()}`}</span>
        <span class="stat">${() => `未完成：${activeCount()}`}</span>
        <span class="stat">${() => `已完成：${doneCount()}`}</span>
      </div>

      <div class="filters">
        <div>
          <button
            class=${() => (state.filter === 'all' ? 'active' : 'secondary')}
            onClick=${() => {
              state.filter = 'all';
            }}
          >
            全部
          </button>
          <button
            class=${() => (state.filter === 'active' ? 'active' : 'secondary')}
            onClick=${() => {
              state.filter = 'active';
            }}
          >
            未完成
          </button>
          <button
            class=${() => (state.filter === 'done' ? 'active' : 'secondary')}
            onClick=${() => {
              state.filter = 'done';
            }}
          >
            已完成
          </button>
        </div>
        <div>
          <button
            class="secondary"
            disabled=${() => doneCount() === 0}
            onClick=${clearDone}
          >
            清空已完成
          </button>
          <button class="secondary" onClick=${exportData}>导出</button>
        </div>
      </div>

      ${Show({
        when: () => state.filter !== 'all',
        children: jsx`
          <p>
            ${() =>
              state.filter === 'active'
                ? `当前只显示未完成任务，共 ${visibleTodos().length} 条`
                : `当前只显示已完成任务，共 ${visibleTodos().length} 条`}
          </p>
        `,
      })}

      <div class="list">
        ${For({
          each: visibleTodos,
          key: (todo) => todo.id,
          fallback: jsx`<div class="empty">暂无任务</div>`,
          children: (todo) => jsx`
            <label class=${() => (todo().done ? 'item done' : 'item')} for=${() => todo().id}>
              <input
                id=${() => todo().id}
                type="checkbox"
                checked=${() => todo().done}
                onChange=${(event) => {
                  todo().done = event.currentTarget.checked;
                }}
              >
              <span class="title">${() => todo().title}</span>
              <button class="secondary" onClick=${() => removeTodo(todo().id)}>
                删除
              </button>
            </label>
          `,
        })}
      </div>
    </main>
  `,
        document.getElementById('app')
      );
    </script>
  </body>
</html>
